name: Android CI with Firebase Emulator

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21" # Changed from 17 to 21
          distribution: "temurin"
          cache: gradle

      - name: Create local.properties
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" >> local.properties
          echo "TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}" >> local.properties
          echo "TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}" >> local.properties
          echo "TWILIO_SRC_PHONE=${{ secrets.TWILIO_SRC_PHONE }}" >> local.properties
          echo "GMAIL_EMAIL=${{ secrets.GMAIL_EMAIL }}" >> local.properties
          echo "GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Create a dummy google-services.json so the build doesn't fail
      - name: Create Mock Google Services JSON
        run: |
          echo '{"project_info":{"project_number":"123","project_id":"mo-test","storage_bucket":"test.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:123","android_client_info":{"package_name":"com.example.soen345"}},"api_key":[{"current_key":"mock_key"}],"services":{"appinvite_service":{"status":1}}}]}' > app/google-services.json

      - name: Install Firebase CLI
        run: curl -sL https://firebase.tools | bash

      - name: Cache Firebase Emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: ${{ runner.os }}-firebase-emulators-${{ hashFiles('firebase.json') }}

      - name: Run Unit Tests
        run: |
          firebase emulators:exec --project soen345project "./gradlew test"

      - name: Enable KVM for Android Emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Integration Tests (Instrumented)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          script: firebase emulators:exec --project soen345project "./gradlew connectedDebugAndroidTest"

      - name: Publish Test Results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: |
            app/build/test-results/**/*.xml
            app/build/outputs/androidTest-results/connected/**/*.xml
          reporter: java-junit
